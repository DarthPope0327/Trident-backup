[mcu orbitoolO2S]
#serial:/dev/serial/by-id/usb-Klipper_stm32f072xb_Orbitool_O2S-if00
serial:/dev/serial/by-id/usb-Klipper_stm32f072xb_280024000757475531303120-if00
restart_method: command

[extruder]
step_pin = orbitoolO2S:PB3
dir_pin = !orbitoolO2S:PB4
enable_pin = !orbitoolO2S:PC14
microsteps = 32
rotation_distance = 4.69 # Orbiter v2.5
full_steps_per_rotation = 200
nozzle_diameter = 0.400
filament_diameter = 1.750
heater_pin = orbitoolO2S:PB9
sensor_pin = orbitoolO2S:PA1
pullup_resistor = 2200
#sensor_type = ATC Semitec 104GT-2 # update with correct sensor type PT1000 sensor are also suported
sensor_type: PT1000
min_temp = 0
max_temp = 500 # increase in case your hottend suports higher operating temperature
pressure_advance = 0.015  # user calibration needed
pressure_advance_smooth_time = 0.04 # user calibration needed
max_extrude_only_distance = 500.0
max_extrude_cross_section = 20
min_extrude_temp = 20
smooth_time = 0.5
max_power: 0.995 # limit heater power to 99.5% to enable autorecovery from short detection
control = pid   # user calibration needed
pid_Kp=25.566 
pid_Ki=1.794 
pid_Kd=91.080


[tmc2240 extruder] 
uart_pin: orbitoolO2S:PC13
interpolate: false
run_current: 0.85 # Orbiter v2.5
rref: 12000
stealthchop_threshold: 0
#driver_TBL: 0
#driver_TOFF: 3
#driver_HEND: 8
#driver_HSTRT: 7

[stepper_x]
endstop_pin: orbitoolO2S:PA2

